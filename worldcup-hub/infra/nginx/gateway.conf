# Author: Bishakh
# API Gateway — the single guarded door into the private network ("VPC").
# It is NOT published to the host; only the edge can reach it (see docker-compose).
# It routes by path to the right internal service and adds a request id.

upstream bff_upstream  { server bff:8080; }
upstream core_upstream { server core-api:8000; }

server {
  listen 8090;
  server_name _;

  # Health for the orchestrator.
  location = /healthz { return 200 "ok\n"; }

  # Frontend-shaped traffic → BFF.
  location /bff/ {
    proxy_pass http://bff_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";
    # SSE needs buffering off so events flush immediately.
    proxy_buffering off;
  }

  # Raw domain API → core-api (trim the /api prefix).
  location /api/ {
    proxy_pass http://core_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
