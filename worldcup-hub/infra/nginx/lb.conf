# Author: Bishakh
# L7 load balancer across core-api replicas. least_conn sends each request to the
# replica with the fewest active connections; unhealthy replicas are skipped.

upstream core_api_pool {
  least_conn;
  server core-api-1:8000 max_fails=3 fail_timeout=10s;
  server core-api-2:8000 max_fails=3 fail_timeout=10s;
}

server {
  listen 8000;
  server_name _;

  location = /healthz { return 200 "ok\n"; }

  location / {
    proxy_pass http://core_api_pool;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # On a failed replica, transparently retry the next one.
    proxy_next_upstream error timeout http_502 http_503;
  }
}
