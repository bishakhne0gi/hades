# Author: Bishakh
# CDN — a caching reverse proxy in front of the edge. Caches GET responses and
# static assets, serves stale while revalidating, and reports HIT/MISS.

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=cdn:10m max_size=200m inactive=60s use_temp_path=off;

server {
  listen 8081;
  server_name _;

  # Static micro-frontend assets: long, immutable cache (filenames are hashed).
  location /assets/ {
    proxy_pass http://edge:8888;
    proxy_cache cdn;
    proxy_cache_valid 200 1h;
    add_header Cache-Control "public, max-age=3600, immutable";
    add_header X-CDN-Cache $upstream_cache_status;
  }

  # Cacheable API responses: short TTL + stale-while-revalidate behaviour.
  location / {
    proxy_pass http://edge:8888;
    proxy_cache cdn;
    proxy_cache_valid 200 10s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
    proxy_cache_background_update on;
    proxy_cache_lock on;
    add_header X-CDN-Cache $upstream_cache_status;
  }
}
