# Author: Bishakh
# TLS termination at the edge boundary. Decrypts HTTPS once, then forwards plain
# HTTP to the edge service on the private network (so origins never do TLS work).
# Generate local certs first: see infra/nginx/gen-certs.sh

server {
  listen 443 ssl;
  server_name localhost;

  ssl_certificate     /etc/nginx/certs/dev.crt;
  ssl_certificate_key /etc/nginx/certs/dev.key;
  ssl_protocols       TLSv1.2 TLSv1.3;

  location / {
    proxy_pass http://edge:8888;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    proxy_buffering off; # keep SSE flushing
  }
}

# Redirect plain HTTP → HTTPS.
server {
  listen 80;
  server_name localhost;
  return 301 https://$host$request_uri;
}
