# Author: Bishakh
# simulator, bff, and edge. The edge is the public entry (exposed via NodePort
# here; an Ingress/LoadBalancer would front it in a real cluster).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulator
  namespace: worldcup
spec:
  replicas: 1
  selector:
    matchLabels: { app: simulator }
  template:
    metadata:
      labels: { app: simulator }
    spec:
      containers:
        - name: simulator
          image: worldcup-simulator:latest
          imagePullPolicy: IfNotPresent
          env:
            - { name: REDIS_URL, value: "redis://redis:6379" }
          ports:
            - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: simulator
  namespace: worldcup
spec:
  selector: { app: simulator }
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: worldcup
spec:
  replicas: 2
  selector:
    matchLabels: { app: bff }
  template:
    metadata:
      labels: { app: bff }
    spec:
      containers:
        - name: bff
          image: worldcup-bff:latest
          imagePullPolicy: IfNotPresent
          env:
            - { name: REDIS_URL, value: "redis://redis:6379" }
            - { name: CORE_API_URL, value: "http://core-api:8000" }
            - { name: SIMULATOR_URL, value: "http://simulator:9000" }
            - { name: PORT, value: "8080" }
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: bff
  namespace: worldcup
spec:
  selector: { app: bff }
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge
  namespace: worldcup
spec:
  replicas: 2
  selector:
    matchLabels: { app: edge }
  template:
    metadata:
      labels: { app: edge }
    spec:
      containers:
        - name: edge
          image: worldcup-edge:latest
          imagePullPolicy: IfNotPresent
          env:
            - { name: BFF_URL, value: "http://bff:8080" }
            - { name: PORT, value: "8888" }
          ports:
            - containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: edge
  namespace: worldcup
spec:
  type: NodePort
  selector: { app: edge }
  ports:
    - port: 8888
      targetPort: 8888
      nodePort: 30888
