# Author: Bishakh
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: worldcup
      POSTGRES_DB: worldcup
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldcup"]
      interval: 5s
      timeout: 3s
      retries: 5

  core-api:
    build: ../../services/core-api
    environment:
      DATABASE_URL: postgresql+psycopg://worldcup:worldcup@postgres:5432/worldcup
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  simulator:
    build: ../../services/simulator
    environment:
      REDIS_URL: redis://redis:6379
      # Flip to real data: set DATA_SOURCE=real and FOOTBALL_API_KEY in a .env file
      # (next to this compose file). Defaults keep the always-on simulator.
      DATA_SOURCE: ${DATA_SOURCE:-sim}
      FOOTBALL_API_KEY: ${FOOTBALL_API_KEY:-}
      FOOTBALL_COMPETITION: ${FOOTBALL_COMPETITION:-WC}
      POLL_INTERVAL: ${POLL_INTERVAL:-20}
    ports:
      - "9000:9000"
    depends_on:
      redis:
        condition: service_healthy

  # NOTE: the BFF (services/bff) joins this stack in Phase 4 with a
  # monorepo-aware Dockerfile. For now run it locally: `pnpm --filter @wc/bff dev`.

volumes:
  pgdata:
